# Drift check — re-runs the OpenAPI Generator against the upstream spec on a
# schedule (or on demand) and opens a pull request if `src/api/` or
# `spec/openapi.json` would change. This is the **only** CI workflow that
# needs Java; PR builds skip it via the `if:` guard below.
name: OpenAPI drift check

on:
  schedule:
    - cron: '0 7 * * 1' # Mondays 07:00 UTC
  workflow_dispatch:

jobs:
  regen:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Re-run OpenAPI Generator
        run: julia --project=. gen/regenerate.jl
      - name: Open PR on diff
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: regenerate src/api/ from upstream OpenAPI spec'
          branch: openapi-drift-check
          title: 'OpenAPI drift detected — regenerate src/api/'
          body: |
            The upstream OpenAPI spec has changed. This PR re-runs
            `gen/regenerate.jl` and commits the resulting `src/api/` and
            `spec/openapi.json` updates.

            Review the diff carefully — generator output churn is normal
            but breaking changes in the spec should be called out in the
            CHANGELOG.
          add-paths: |
            src/api/**
            spec/openapi.json
